<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغيير كلمة المرور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css-files/chang-pass.css">
</head>
<body>
    <div class="card">
        <h2>تغيير كلمة المرور</h2>
        <form id="passwordForm">
            <div class="input-group">
                <label>كلمة المرور الحالية</label>
                <div class="password-wrapper">
                    <input type="password" id="old_pass" placeholder="أدخل كلمة المرور الحالية" required>
                    <i class="fas fa-eye-slash toggle-eye" data-target="old_pass"></i>
                </div>
            </div>
            <div class="input-group">
                <label>كلمة المرور الجديدة</label>
                <div class="password-wrapper">
                    <input type="password" id="new_pass" placeholder="أدخل كلمة المرور الجديدة" required>
                    <i class="fas fa-eye-slash toggle-eye" data-target="new_pass"></i>
                </div>
            </div>
            <div class="input-group">
                <label>تأكيد كلمة المرور</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm_pass" placeholder="أعد كتابة كلمة المرور" required>
                    <i class="fas fa-eye-slash toggle-eye" data-target="confirm_pass"></i>
                </div>
            </div>
            <button type="submit" class="btn-submit">تحديث كلمة المرور</button>
            <a href="CareMate Dashboard.html" class="back-link">إلغاء والعودة للملف الشخصي</a>
        </form>
    </div>
    <script>
        // برمجة ميزة العين لتعمل على جميع الحقول
        document.querySelectorAll('.toggle-eye').forEach(eyeIcon => {
            eyeIcon.addEventListener('click', function() {
                // الحصول على الـ ID الخاص بالحقل المستهدف
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (input.type === 'password') {
                    input.type = 'text';
                    this.classList.replace('fa-eye-slash', 'fa-eye');
                } else {
                    input.type = 'password';
                    this.classList.replace('fa-eye', 'fa-eye-slash');
                }
            });
        });
        // تنبيه بسيط عند الإرسال
        document.getElementById('passwordForm').onsubmit = (e) => {
            e.preventDefault();
            const n = document.getElementById('new_pass').value;
            const c = document.getElementById('confirm_pass').value;
            
            if (n !== c) {
                alert("كلمة المرور الجديدة غير متطابقة!");
            } else {
                alert("تم تغيير كلمة المرور بنجاح في CareMate ✨");
            }
        };
    </script>
    <script>
        // 1. تشغيل قائمة الهمبرجر
        const menuIcon = document.getElementById('mobile-menu');
        const navList = document.getElementById('nav-list');
        menuIcon.onclick = function() {
            navList.classList.toggle('active');
        };
    </script>
</body>
</html>
