<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل البيانات الشخصية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css-files/UpDate-Data.css">
</head>
<body>
    <div class="container">
    <div class="sidebar" id="sidebarMenu">
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="../../imges/user.jpg" alt="user-picture" style="border-radius: 50%; width: 25%;">
            <p style="font-weight: bold; font-size: 14px;">أهلاً ، هاني</p>
        </div>
        <a href="#" class="sidebar-item" onclick="activateItem(this)"><i class="fas fa-clipboard-list"></i> طلباتي</a>
        <a href="#" class="sidebar-item" onclick="activateItem(this)"><i class="fas fa-heart"></i> تبرعاتي</a>
        <a href="#" class="sidebar-item" onclick="activateItem(this)"><i class="fas fa-bell"></i> الإشعارات</a>
        <a href="#" class="sidebar-item" onclick="activateItem(this)"><i class="fas fa-cog"></i> الإعدادات</a>
    </div>
    <div class="content">
            <div class="header-title">تعديل الملف الشخصي</div>
            <form id="editForm">
                <div class="profile-section">
                    <div class="profile-img-container">
                        <img src="../../imges/user.jpg" alt="Profile" class="profile-img" id="preview">
                    </div>
                    <label for="img-upload" class="upload-label">
                        <i class="fas fa-camera"></i> تغيير الصورة
                    </label>
                    <input type="file" id="img-upload" style="display: none;" accept="image/*">
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>الاسم الكامل</label>
                        <input type="text" value="Hany Amir">
                    </div>
                    <div class="form-group">
                        <label>رقم الهاتف</label>
                        <input type="tel" value="010258963147">
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" value="hany@gmail.com">
                    </div>
                    <div class="form-group">
                        <label>المدينة</label>
                        <select>
                            <option>القاهرة - مدينة نصر</option>
                            <option>الجيزة</option>
                            <option>الإسكندرية</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور الجديدة</label>
                        <div class="input-wrapper">
                            <input type="password" id="pass1" placeholder="********">
                            <i class="fas fa-eye toggle-password" onclick="togglePass('pass1', this)"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>تأكيد كلمة المرور</label>
                        <div class="input-wrapper">
                            <input type="password" id="pass2" placeholder="********">
                            <i class="fas fa-eye toggle-password" onclick="togglePass('pass2', this)"></i>
                        </div>
                    </div>
                </div>
                <div class="actions">
                    <a href="CareMate Dashboard.html"><button type="button" class="btn btn-cancel">إلغاء</button></a>
                    <button type="submit" class="btn btn-save">حفظ التعديلات</button>
                </div>
            </form>
        </div>
    </div>
    <script>
            // وظيفة تبديل الحالة النشطة (اللون الأبيض) بين العناصر
            function activateItem(element) {
                // إزالة الكلاس active من جميع العناصر الأخرى
                const items = document.querySelectorAll('.sidebar-item');
                items.forEach(item => {
                    item.classList.remove('active');
                });
                
                // إضافة الكلاس للعنصر الذي تم الضغط عليه
                element.classList.add('active');
            }
            // معاينة الصورة المرفوعة
            document.getElementById('img-upload').onchange = function (evt) {
                const [file] = this.files;
                if (file) {
                    document.getElementById('preview').src = URL.createObjectURL(file);
                }
            }
        // وظيفة إظهار وإخفاء كلمة المرور
        function togglePass(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password"; // هنا كان يوجد خطأ في كودك الأصلي وتم تصحيحه
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        // معاينة الصورة المرفوعة
        document.getElementById('img-upload').onchange = function (evt) {
            const [file] = this.files;
            if (file) {
                document.getElementById('preview').src = URL.createObjectURL(file);
            }
        }
        // التحقق من تطابق كلمة المرور عند حفظ التعديلات
        document.getElementById('editForm').onsubmit = function (e) {
            const pass1 = document.getElementById('pass1').value;
            const pass2 = document.getElementById('pass2').value;
            // التحقق من التطابق
            if (pass1 !== pass2) {
                e.preventDefault(); // منع إرسال البيانات
                alert("عذراً.. كلمة المرور غير متطابقة، يرجى التأكد وإعادة المحاولة.");
                return false;
            }
            // إذا كانت الحقول فارغة (اختياري حسب رغبتك)
            if (pass1 === "" && pass2 === "") {
                // يمكنك تركها فارغة إذا كان المستخدم لا يريد تغيير كلمة المرور
            }
            alert("تم حفظ التعديلات بنجاح!");
            return true;
        };
        // وظيفة تبديل الحالة النشطة
        function activateItem(element) {
            const items = document.querySelectorAll('.sidebar-item');
            items.forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }
        document.getElementById('pass2').oninput = function() {
            const pass1 = document.getElementById('pass1').value;
            if (this.value !== pass1) {
                this.setCustomValidity("كلمة المرور غير متطابقة");
            } else {
                this.setCustomValidity("");
            }
        };
    </script>
</body>
</html>
