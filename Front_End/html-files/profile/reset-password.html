<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعادة تعيين كلمة السر</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../css-files/reset-password.css">
</head>
<body>
    <div class="card">
        <h2> تعيين كلمة جديدة 🔒</h2>
        <p class="subtitle">ادخل كلمة سر قوية لحماية حسابك</p>
        <!-- Password -->
        <div class="input-group">
            <input type="password" id="pass1" placeholder="كلمة السر الجديدة">
            <span class="toggle" onclick="togglePassword('pass1', this)">
                <i class="fa-solid fa-eye"></i>
            </span>
        </div>
        <!-- Confirm -->
        <div class="input-group">
            <input type="password" id="pass2" placeholder="تأكيد كلمة السر">
            <span class="toggle" onclick="togglePassword('pass2', this)">
                <i class="fa-solid fa-eye"></i>
            </span>
        </div>
        <button onclick="resetPassword()">تأكيد</button>
        <p class="message" id="msg"></p>
    </div>
    <script>
        function togglePassword(inputId, element) {
            const input = document.getElementById(inputId);
            const icon = element.querySelector("i");
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
        function resetPassword() {
            const pass1 = document.getElementById("pass1").value;
            const pass2 = document.getElementById("pass2").value;
            const msg = document.getElementById("msg");
            if(pass1.length < 6) {
                msg.innerText = "كلمة السر ضعيفة (6 أحرف على الأقل)";
                msg.style.color = "red";
                return;
            }
            if(pass1 !== pass2) {
                msg.innerText = "كلمتا السر غير متطابقتين";
                msg.style.color = "red";
                return;
            }
            msg.innerText = "تم تغيير كلمة السر بنجاح ✅";
            msg.style.color = "green";
            // تحويل لصفحة تسجيل الدخول بعد ثانيتين
            setTimeout(() => {
                window.location.href = "sign-in.html";
            }, 2000);
        }
    </script>
</body>
</html>
