<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> CareMate - تسجيل الخروج</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../css-files/log-out.css">
</head>
<body>
    <button class="logout-trigger-btn" onclick="toggleModal(true)">
        <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
    </button>
    <div class="modal-overlay" id="logoutModal">
        <div class="modal-box">
            <div class="modal-icon">
                <i class="fas fa-exclamation-circle"></i>
            </div>
            <h2>تأكيد تسجيل الخروج</h2>
            <p>هل أنت متأكد أنك تريد إنهاء الجلسة الحالية؟</p>
            
            <div class="modal-actions">
                <button class="btn btn-confirm" onclick="actionLogout()">تسجيل خروج</button>
                <button class="btn btn-cancel" onclick="toggleModal(false)">إلغاء</button>
            </div>
        </div>
    </div>
    <script>
        const modal = document.getElementById('logoutModal');
        // دالة لفتح وإغلاق النافذة
        function toggleModal(show) {
            if (show) {
                modal.style.display = 'flex';
            } else {
                modal.style.display = 'none';
            }
        }
        // دالة تنفيذ تسجيل الخروج
        function actionLogout() {
            // يمكنك توجيه المستخدم لصفحة تسجيل الدخول هنا
            alert("يتم الآن تسجيل الخروج...");
            window.location.href ="../html-files/home.html"; // استبدلها برابط صفحة الدخول لديك
        }
        // إغلاق النافذة عند الضغط خارج المربع الأبيض
        window.onclick = function(event) {
            if (event.target == modal) {
                toggleModal(false);
            }
        }
    </script>
</body>
</html>
