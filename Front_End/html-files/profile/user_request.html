<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة المستخدم </title>
    <link rel="stylesheet" href="../../css-files/CareMate Dashboard.css">
      <link rel="stylesheet" href="../../css-files/style.css">
    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons (via CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-right">
            <div class="menu-toggle" id="mobile-menu">
                <span style="font-size: 1.5rem; cursor: pointer;">☰</span>
            </div>
            <div class="logo"><img src="../../imges/f2.jpeg" alt="Logo"></div>
            <ul class="nav-links" id="nav-list">
                <li><a href="../home.html">🏠 الصفحة الرئيسية</a></li>
                <li><a href="../hospitals.html">🔍 العثور على مستشفى</a></li>
                <li class="dropdown">
                    💊 خدمات الدواء ▾
                    <div class="dropdown-content">
                        <a href="../donating-medicine.html">🩸 تبرع بالدواء</a>
                        <a href="../order-medicine.html">📦 طلب الدواء</a>
                    </div>
                </li>
                <li><a href="../first-aid.html">🚑 الإسعافات الأولية</a></li>
            </ul>
        </div>
        <div class="nav-left">
            <a href="../sign-in.html" style="text-decoration-line: none;">
            <button class="login-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/1077/1077063.png" class="user-icon-img" alt="user">
                تسجيل دخول
            </button>
            </a>
             <div class="settings-icons">
                <div class="notification-container">
                    <span style="color:#333; font-size:1rem;"><a href="user_notification.html"style="list-style: none;text-decoration: none; ">🔔</a></span>
                    <span class="red-dot"></span>
                </div>
                <span class="icon-settings"><a href="user_setting.html"style="list-style: none;text-decoration: none ;">⚙️</a></span>
            </div>
        </div>
    </nav>
    <main class="dashboard-grid">
            <aside class="sidebar-right card-style">
                <div class="user-info-header">
                    <img src="../../imges/user.jpg" alt="user-picture" class="mini-avatar">
                    <span> <a href="CareMate Dashboard.html"style="list-style: none;text-decoration: none;"> الملف الشخصي </a></span>
                </div>
                <ul class="side-menu">
                    <li>📋<span><a href="user_request.html"style="list-style: none;text-decoration: none; ">طلباتي</a>  </span></li>
                    <li>❤️<span><a href="user_donation.html"style="list-style: none;text-decoration: none; ">تبرعاتي</a></span></li>
                    <li>🔔<span><a href="user_notification.html"style="list-style: none;text-decoration: none; ">الإشعارات</a></span></li>
                    <li>⚙️<span><a href="user_setting.html"style="list-style: none;text-decoration: none; ">الإعدادات</a></span></li>
                </ul>
            </aside>
            
        <div class="w-full flex-col items-center flex gap-4" style="width: 150%;">
            <div class="page-title" data-i18n="requests.title">تفاصيل الطلب</div>
            <div class="card" style="padding: 30px;">
                <div class="flex justify-between items-center"
                    style="border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 15px;">
                    <span style="font-size: 1.2rem; font-weight: bold; color: var(--text-main);"
                        data-i18n="requests.reqNum">رقم الطلب:</span>
                    <span style="font-size: 1.2rem; font-weight: bold; color: var(--text-main);">1456789</span>
                    
                </div>
                <div class="flex flex-col gap-4" style="align-items: flex-start; margin-bottom: 30px;">
                    <div class="flex items-center gap-3">
                        <span
                            style="color: #e0a800; font-weight: bold; background-color: #fff3cd; padding: 5px 15px; border-radius: 20px;"
                            data-i18n="requests.underReview">قيد المراجعة</span>
                        <i data-lucide="hourglass" color="#e0a800"></i>
                    </div>
                    <div class="flex items-center gap-3"
                        style="border-bottom: 1px solid var(--border-color); padding-bottom: 15px; width: 100%; justify-content: flex-start;">
                        <span style="font-size: 1.1rem; font-weight: bold; color: #1b4965;"
                            data-i18n="requests.desc1">مسكن وخافض للحرارة</span>
                        <i data-lucide="stethoscope" color="#1b4965"></i>
                    </div>
                    <div class="flex items-center gap-3">
                        <span style="font-size: 1.1rem; color: var(--text-main);"
                            data-i18n="requests.desc2">باراستامول</span>
                        <i data-lucide="pill" color="#d32f2f"></i>
                    </div>
                    <div class="flex items-center gap-3">
                        <span style="font-size: 1.1rem; color: var(--text-main);" data-i18n="requests.desc3">ألم
                            شديد</span>
                        <i data-lucide="heart-pulse" color="#1b4965"></i>
                    </div>
                </div>
                <div class="flex justify-between" style="gap: 20px; margin-bottom: 30px; flex-wrap: wrap;">
                    <label class="image-upload-card">
                        <div class="flex items-center gap-2 w-full"
                            style="justify-content: flex-start; margin-bottom: 15px; font-weight: bold; font-size: 1.1rem; color: var(--text-main);">
                            <span data-i18n="requests.prescImage">عرض صورة الروشته</span>
                            <i data-lucide="clipboard-list" color="#1b4965"></i>
                        </div>
                        <input type="file" accept="image/*" style="display: none;"
                            onchange="handleImageUpdate(this, 'presc-img')">
                        <img id="presc-img"
                            src="https://images.unsplash.com/photo-1585435557343-3b092031a831?auto=format&fit=crop&q=80&w=400"
                            alt="Prescription">
                        <div class="change-hint" data-i18n="requests.changeImage">اضغط لتغيير الصورة</div>
                    </label>
                    <label class="image-upload-card">
                        <div class="flex items-center gap-2 w-full"
                            style="justify-content: flex-start; margin-bottom: 15px; font-weight: bold; font-size: 1.1rem; color: var(--text-main);">
                            <span data-i18n="requests.idImage">عرض صورة البطاقة</span>
                            <i data-lucide="id-card" color="#1b4965"></i>
                        </div>
                        <input type="file" accept="image/*" style="display: none;"
                            onchange="handleImageUpdate(this, 'id-img')">
                        <img id="id-img"
                            src="https://images.unsplash.com/photo-1633332755192-727a05c4013d?auto=format&fit=crop&q=80&w=400"
                            alt="ID Card">
                        <div class="change-hint" data-i18n="requests.changeImage">اضغط لتغيير الصورة</div>
                    </label>
                </div>
                <div class="flex justify-between items-center"
                    style="border-top: 2px solid var(--border-color); padding-top: 20px;">
                    <div class="flex gap-2">
                        <button class="secondary-btn" style="padding: 10px 25px;"
                            onclick="alert(t('requests.cancelReq'))" data-i18n="requests.cancelReq">إلغاء الطلب</button>
                        <button class="cancel-btn" style="padding: 10px 25px;" onclick="alert(t('common.edit'))"
                            data-i18n="common.edit">تعديل</button>
                    </div>
                    <div>
                        <button class="primary-btn" style="padding: 10px 30px;" onclick="alert(t('requests.editReq'))"
                            data-i18n="requests.editReq">تعديل الطلب</button>
                    </div>
                </div>
            </div>
        </div>
     
    <script src="../../js/script.js">
      
    </script>
</body>
</html>
